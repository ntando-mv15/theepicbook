services:

  db:
    image: mysql:5.7
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}

    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro


    networks:
      - backend

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================
  # Service 2 — Application (Node.js + Express)
  # ===========================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      NODE_ENV: ${NODE_ENV}
      JAWSDB_URL: ${JAWSDB_URL}



    networks:
      - backend
      - frontend

    healthcheck:
        test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 15s  

    depends_on:
      db:
        condition: service_healthy

    logging:
      driver: "json-file"
      options:
        # Prevent logs from filling up the VM disk.
        max-size: "10m"
        max-file: "3"

  # ===========================================================
  # Service 3 — Reverse Proxy (Nginx)
  # ===========================================================
  proxy:
    image: nginx:alpine

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        - ./logs/nginx:/var/log/nginx

    networks:
      - frontend
    
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    depends_on:
      - app


networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge


volumes:
  db_data: